<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jovian Drift SOS</title>
    <link rel="stylesheet" href="./styles/styles.css">
</head>
<body>
    <iframe id="bg-frame" src="./styles/effect.html"></iframe>
    <form action="#" method="post">
        <fieldset>
            <legend>Pilot Credentials</legend>
            <label for="pilot-name">Pilot Name:</label>
            <input type="text" id="pilot-name" name="pilot_name" required placeholder="Enter name">

            <label for="access-code">Access Code:</label>
            <input type="password" id="access-code" name="access_code" required placeholder="Enter code">

            <label for="email">Command Email:</label>
            <input type="email" id="email" name="email" required placeholder="Enter email">

        </fieldset>
        <fieldset>
            <legend>Vessel Diagnostics</legend>
            <label for="hull-damage">Hull Damage (%):</label>
            <input type="number" id="hull-damage" name="hull_damage" required placeholder="Enter hull damage percentage" min="0" max="100">

            <label for="emergency-level">Emergency Level:</label>
            <select id="emergency-level" name="emergency_level" required>
                <option value="">Select level</option>
                <option value="low">Low</option>
                <option value="medium">Medium</option>
                <option value="high">High</option>
            </select>
        </fieldset>
        <fieldset>
            <legend>Mission Log & Evidence</legend>
            <label for="sos-message">SOS Message:</label>
            <textarea id="sos-message" name="sos_message" required placeholder="Enter SOS message" rows="3"></textarea>
        </fieldset>
        <div>
            <input type="checkbox" id="quarantine" name="quarantine" value="Quarantine" required>
            <label for="quarantine">I agree to quarantine protocols.</label>
            <button type="submit">INITIATE TRANSMISSION</button>
            <button type="reset">RESET SYSTEM</button>
        </div>
    </form>

    <script src="./styles/script.js"></script>
</body>
</html>
